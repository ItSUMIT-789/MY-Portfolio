Here is my App.jsx
import { Routes, Route } from "react-router-dom";
import Home from "./pages/Home";
import MyBookings from "./pages/MyBookings";
import BookingDetails from "./pages/BookingDetails"; // 👈 ADD THIS
import UnreservedBooking from "./pages/UnreservedBooking";
import SearchStation from "./pages/SearchStation";
import ConfirmBooking from "./pages/ConfirmBooking";

function App() {
  return (
    <Routes>
      <Route path="/" element={<Home />} />
      <Route path="/bookings" element={<MyBookings />} />
      <Route path="/ticket/:id" element={<BookingDetails />} />
      <Route path="/unreserved" element={<UnreservedBooking />} />
      <Route path="/search-station" element={<SearchStation />} />
      <Route path="/confirm-booking" element={<ConfirmBooking />} />
    </Routes>
  );
}

export default App;

